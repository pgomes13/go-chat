<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #app {
      width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 20px;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
    }
    #status-dot.connected { background: #34d399; }
    #status-dot.disconnected { background: #f87171; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .msg.mine {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.theirs {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .msg .sender {
      font-size: .72rem;
      font-weight: 600;
      margin-bottom: 2px;
      opacity: .7;
    }

    .notice {
      align-self: center;
      font-size: .78rem;
      color: #9ca3af;
      padding: 4px 0;
    }

    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: #4f46e5; }

    button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #c7d2fe; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span id="status-dot"></span>
    <span>Go Chat</span>
  </header>
  <div id="messages"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" disabled>
    <button id="send-btn" type="submit" disabled>Send</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const form       = document.getElementById('form');

  // Derive a random username once per session
  const username = 'user_' + Math.random().toString(36).slice(2, 6);

  let ws;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      setStatus('connected');
      addNotice('Connected');
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      setStatus('disconnected');
      addNotice('Disconnected — reconnecting in 3s…');
      inputEl.disabled = true;
      sendBtn.disabled = true;
      setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
      const lines = e.data.trim().split('\n');
      lines.forEach(line => {
        if (!line) return;
        try {
          const { sender, text } = JSON.parse(line);
          addMessage(sender, text, sender === username);
        } catch {
          addMessage('', line, false);
        }
      });
    };
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ sender: username, text }));
    inputEl.value = '';
  });

  function addMessage(sender, text, mine) {
    const div = document.createElement('div');
    div.className = `msg ${mine ? 'mine' : 'theirs'}`;
    if (sender && !mine) {
      const s = document.createElement('div');
      s.className = 'sender';
      s.textContent = sender;
      div.appendChild(s);
    }
    const t = document.createElement('div');
    t.textContent = text;
    div.appendChild(t);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addNotice(text) {
    const div = document.createElement('div');
    div.className = 'notice';
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(state) {
    statusDot.className = state;
  }

  connect();
</script>
</body>
</html>
