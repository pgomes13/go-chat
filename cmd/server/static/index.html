<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ── Login screen ── */
    #login-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }
    #login-screen h1 { font-size: 2rem; color: #111; }
    #login-screen p  { color: #6b7280; }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: .95rem;
      font-weight: 500;
      color: #3c4043;
      text-decoration: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: box-shadow .15s;
    }
    .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }

    /* ── Chat app ── */
    #app {
      display: none;
      width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 16px;
      background: #4f46e5;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
    }
    #status-dot.connected    { background: #34d399; }
    #status-dot.disconnected { background: #f87171; }

    header .title { font-weight: 600; flex: 1; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
    }
    #user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4);
    }
    #logout-link {
      color: rgba(255,255,255,.75);
      text-decoration: none;
      font-size: .78rem;
    }
    #logout-link:hover { color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.theirs {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111;
      border-bottom-left-radius: 4px;
    }
    .msg .sender {
      font-size: .72rem;
      font-weight: 600;
      margin-bottom: 2px;
      opacity: .7;
    }

    .notice {
      align-self: center;
      font-size: .78rem;
      color: #9ca3af;
      padding: 4px 0;
    }

    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: #4f46e5; }
    button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover    { background: #4338ca; }
    button:disabled { background: #c7d2fe; cursor: default; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <h1>Go Chat</h1>
  <p>Sign in to start chatting</p>
  <a href="/auth/google" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.039l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Sign in with Google
  </a>
</div>

<!-- Chat app -->
<div id="app">
  <header>
    <span id="status-dot"></span>
    <span class="title">Go Chat</span>
    <div id="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
      <a id="logout-link" href="/auth/logout">Sign out</a>
    </div>
  </header>
  <div id="messages"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" disabled>
    <button id="send-btn" type="submit" disabled>Send</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const form       = document.getElementById('form');

  let currentUser = null;
  let ws;

  async function init() {
    const resp = await fetch('/me');
    if (!resp.ok) {
      document.getElementById('login-screen').style.display = 'flex';
      return;
    }
    currentUser = await resp.json();
    document.getElementById('user-name').textContent = currentUser.name;
    document.getElementById('user-avatar').src = currentUser.picture;
    document.getElementById('app').style.display = 'flex';
    connect();
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      setStatus('connected');
      addNotice('Connected');
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      setStatus('disconnected');
      addNotice('Disconnected — reconnecting in 3s…');
      inputEl.disabled = true;
      sendBtn.disabled = true;
      setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
      e.data.trim().split('\n').forEach(line => {
        if (!line) return;
        try {
          const { sender, text } = JSON.parse(line);
          addMessage(sender, text, sender === currentUser.name);
        } catch {
          addMessage('', line, false);
        }
      });
    };
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ text }));
    inputEl.value = '';
  });

  function addMessage(sender, text, mine) {
    const div = document.createElement('div');
    div.className = `msg ${mine ? 'mine' : 'theirs'}`;
    if (sender && !mine) {
      const s = document.createElement('div');
      s.className = 'sender';
      s.textContent = sender;
      div.appendChild(s);
    }
    const t = document.createElement('div');
    t.textContent = text;
    div.appendChild(t);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addNotice(text) {
    const div = document.createElement('div');
    div.className = 'notice';
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(state) { statusDot.className = state; }

  init();
</script>
</body>
</html>
